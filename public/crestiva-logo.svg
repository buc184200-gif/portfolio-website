<svg width="100%" height="100%" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A741E" />
      <stop offset="20%" stop-color="#FDF1B8" />
      <stop offset="45%" stop-color="#C29B38" />
      <stop offset="60%" stop-color="#FFEBAD" />
      <stop offset="80%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A640F" />
    </linearGradient>

    <!-- Glowing Radial Gradient for Star Flares -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#FFF9E3" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#E2C974" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#E2C974" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Golden Orbit Ring -->
  <circle cx="100" cy="100" r="72" stroke="url(#goldGradient)" stroke-width="1.2" stroke-opacity="0.9" fill="none" />

  <!-- Monogram Letters C & W (Styled in Playfair Display / Georgia) -->
  <g id="monogram" transform="translate(0, -2)">
    <!-- Elegant Serif 'C' on the Left -->
    <text x="82" y="122" 
          font-family="'Playfair Display', 'Didot', 'Bodoni MT', 'Georgia', serif" 
          font-size="82" 
          fill="url(#goldGradient)" 
          font-weight="400" 
          text-anchor="end" 
          letter-spacing="-1">C</text>

    <!-- Elegant Serif 'W' overlapping on the Right -->
    <text x="84" y="122" 
          font-family="'Playfair Display', 'Didot', 'Bodoni MT', 'Georgia', serif" 
          font-size="82" 
          font-style="italic" 
          fill="url(#goldGradient)" 
          font-weight="400" 
          text-anchor="start">W</text>
  </g>

  <!-- Sparkle 1: Top-Right (approx 55 degrees) -->
  <g transform="translate(159, 59)">
    <!-- Radial Flare Glow -->
    <circle cx="0" cy="0" r="14" fill="url(#starGlow)" />
    <!-- Bright Center Core -->
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" />
    <!-- Vertical and Horizontal Rays -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="url(#goldGradient)" stroke-width="0.8" />
    <line x1="0" y1="-12" x2="0" y2="12" stroke="url(#goldGradient)" stroke-width="0.8" />
    <!-- Diagonal Subtle Rays -->
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="url(#goldGradient)" stroke-width="0.5" stroke-opacity="0.7" />
    <line x1="-7" y1="7" x2="7" y2="-7" stroke="url(#goldGradient)" stroke-width="0.5" stroke-opacity="0.7" />
  </g>

  <!-- Sparkle 2: Bottom-Left (approx 235 degrees) -->
  <g transform="translate(41, 141)">
    <!-- Radial Flare Glow -->
    <circle cx="0" cy="0" r="14" fill="url(#starGlow)" />
    <!-- Bright Center Core -->
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" />
    <!-- Vertical and Horizontal Rays -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="url(#goldGradient)" stroke-width="0.8" />
    <line x1="0" y1="-12" x2="0" y2="12" stroke="url(#goldGradient)" stroke-width="0.8" />
    <!-- Diagonal Subtle Rays -->
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="url(#goldGradient)" stroke-width="0.5" stroke-opacity="0.7" />
    <line x1="-7" y1="7" x2="7" y2="-7" stroke="url(#goldGradient)" stroke-width="0.5" stroke-opacity="0.7" />
  </g>
</svg>
